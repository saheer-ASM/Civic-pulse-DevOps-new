services:
  
  # Backend service
  backend:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb+srv://civicUser:.-H-7TbdMD46te6@cluster0.tpiup7t.mongodb.net/?appName=Cluster0
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - BCRYPT_SALT_ROUNDS=12
      - CLIENT_URL=http://localhost:3000
      - LOG_LEVEL=info
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend service
  frontend:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    restart: unless-stopped
    networks:
      - app-network


networks:
  app-network:
    driver: bridge
